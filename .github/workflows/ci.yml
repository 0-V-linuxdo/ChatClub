name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify source, generated assets, tests, and package allowlist
        run: npm run ci
      - name: Build deterministic extension archives
        run: |
          npm run pack
          npm run pack:firefox
      - uses: actions/upload-artifact@v4
        with:
          name: chatclub-extension
          path: dist/*.zip
          if-no-files-found: error
